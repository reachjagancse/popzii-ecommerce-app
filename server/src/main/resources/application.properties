spring.datasource.url=jdbc:h2:mem:popzii;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.port=4000

# Using in-memory H2 for local development. Swap to Postgres in production by
# updating the datasource URL/credentials and driver.
